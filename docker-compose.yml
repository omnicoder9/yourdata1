services:
  postgres:
    image: postgres:16
    container_name: collector_test_db
    environment:
      POSTGRES_USER: collector
      POSTGRES_PASSWORD: collector
      POSTGRES_DB: collector_test
    ports:
      - "5432:5432"
    volumes:
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
